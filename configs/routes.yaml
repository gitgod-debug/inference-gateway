# ============================================================
# Inference Gateway — Backend Routes Configuration
# ============================================================
# All backends are configured here: free APIs, self-hosted,
# and BYOK (Bring Your Own Key) providers.
#
# Environment variables can be referenced with ${VAR_NAME}
# ============================================================

backends:
  # ── Free Backends (zero cost, no credit card) ─────────────

  - name: groq
    type: openai_compatible
    base_url: "https://api.groq.com/openai/v1"
    api_key: "${GROQ_API_KEY}"
    models:
      - "llama-3.3-70b-versatile"
      - "llama-3.1-8b-instant"
      - "mixtral-8x7b-32768"
      - "deepseek-r1-distill-llama-70b"
    health_endpoint: "/models"
    priority: 1                     # Highest priority in fallback chain
    tags: ["free", "fast"]

  - name: openrouter
    type: openai_compatible
    base_url: "https://openrouter.ai/api/v1"
    api_key: "${OPENROUTER_API_KEY}"
    models:
      - "openrouter/auto"           # Auto-selects best free model
    health_endpoint: "/models"
    priority: 2
    tags: ["free", "fallback"]

  - name: gemini
    type: openai_compatible
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    api_key: "${GEMINI_API_KEY}"
    models:
      - "gemini-2.0-flash"
    health_endpoint: "/models"
    priority: 3
    tags: ["free", "high-tpm"]

