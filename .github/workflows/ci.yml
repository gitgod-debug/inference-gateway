name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Check for secrets
        run: |
          # Fail if any real API keys are committed
          ! grep -rn "sk-\|gsk_\|AIza\|ghp_" src/ configs/ --include="*.py" --include="*.yaml"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t inference-gateway .

      - name: Verify Docker health
        run: |
          docker run -d --name gw -p 8080:8080 \
            -e GATEWAY_AUTH_ENABLED=false \
            inference-gateway
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop gw
