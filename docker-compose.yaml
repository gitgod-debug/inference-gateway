# ============================================================
# Inference Gateway — Docker Compose
# ============================================================
# Usage:
#   docker compose up -d            # Gateway + monitoring
#   docker compose --profile ollama up -d  # + Ollama backend
# ============================================================

services:
  # ── Gateway ───────────────────────────────────────────────
  gateway:
    build: .
    container_name: inference-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      - prometheus
    networks:
      - gateway-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M               # Gateway is lightweight — cap it
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8080/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Ollama (optional, for local self-hosted testing) ──────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - gateway-net
    restart: unless-stopped

  # ── Monitoring Stack ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    # ── RETENTION: Auto-purge old data to prevent unbounded growth ──
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"    # Delete data older than 7 days
      - "--storage.tsdb.retention.size=500MB"  # Delete oldest data if exceeds 500MB
      - "--storage.tsdb.wal-compression"       # Compress write-ahead log
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gateway-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M               # Cap Prometheus memory

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=gateway2026
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/gateway.json
      # ── DATA RETENTION ──
      - GF_DATABASE_WAL=true
      - GF_ALERTING_ENABLED=false             # Not needed, save memory
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - gateway-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M               # Grafana doesn't store much

networks:
  gateway-net:
    driver: bridge

volumes:
  ollama_data:
  prometheus_data:
  grafana_data:
